blueprint:
  name: "🔘 Shelly Detached Input"
  description: >-
    Run any action when a Shelly detached input changes state. Select the
    Shelly binary sensor that represents the wall-switch input and this
    blueprint will react to its state changes. By default it can toggle a
    selected smart light while making sure the Shelly relay is on first, and
    you can optionally override the toggle step with a custom action sequence.
  domain: automation
  author: pschmitt
  input:
    required_entities:
      name: "Required Entities"
      icon: mdi:light-switch
      description: >-
        Select the Shelly input, the Shelly relay, and the smart light this
        blueprint should control.
      input:
        shelly_input:
          name: "🔌 Shelly detached input sensor"
          description: >-
            Select the Shelly binary sensor for the physical switch input, for
            example `binary_sensor.kitchen_lights_left_switch`. Shelly exposes
            these inputs as `power` binary sensors, so the selector is filtered to
            Shelly `binary_sensor` entities with device class `power`.
          selector:
            entity:
              filter:
                - integration: shelly
                  domain: binary_sensor
                  device_class: power
        shelly_relay:
          name: "🔁 Shelly relay"
          description: The Shelly switch entity that powers the smart light circuit.
          selector:
            entity:
              filter:
                - integration: shelly
                  domain: switch
        target_light:
          name: "💡 Target smart light"
          description: The light entity to toggle when the detached input changes state.
          selector:
            entity:
              domain: light
    optional_behavior:
      name: "Optional Behavior"
      icon: mdi:tune-variant
      description: >-
        Optional settings for the built-in light toggle behavior. Leave these at
        their defaults to keep the basic switch-to-toggle flow.
      collapsed: true
      input:
        brightness_pct:
          name: "🔆 Toggle brightness"
          description: Brightness percentage to apply when toggling the smart light.
          default: 85
          selector:
            number:
              min: 1.0
              max: 100.0
              unit_of_measurement: "%"
              step: 1.0
              mode: slider
        light_color_temp:
          name: "🌡️ Optional color temperature"
          description: >-
            Optional color temperature to apply when turning the smart light on.
            Leave the default empty value to keep the light's existing or
            integration-defined color temperature.
          default:
          selector:
            color_temp:
        fallback_power_sensor:
          name: "⚡ Optional fallback power sensor"
          description: >-
            Optional power sensor for the smart light circuit. When the smart
            light itself is unavailable, or when the bulb does not react to a
            toggle command, the blueprint can use this reading to decide
            whether the bulb is effectively on or off while the relay is still
            on.
          default:
          selector:
            entity:
              filter:
                - domain: sensor
                  device_class: power
        light_state_change_timeout:
          name: "⌛ Light state change timeout"
          description: >-
            How long to wait for the smart bulb to react after the blueprint
            sends its built-in on or off command. If the expected light state
            or power draw is not observed within this window, the Shelly relay
            is toggled as a recovery step.
          default:
            seconds: 1
          selector:
            duration:
        fallback_off_threshold_w:
          name: "📏 Fallback off threshold"
          description: >-
            When the smart light is unavailable, readings at or below this
            wattage are treated as "light off" and trigger a relay power-cycle.
          default: 1
          selector:
            number:
              min: 0.0
              max: 25.0
              unit_of_measurement: "W"
              step: 0.1
              mode: box
        fallback_power_cycle_delay:
          name: "⏱️ Fallback power-cycle delay"
          description: >-
            Delay between turning the relay off and back on when the unavailable
            smart light is inferred to be off from the fallback power reading.
          default:
            milliseconds: 800
          selector:
            duration:
              enable_millisecond: true
        custom_action:
          name: "🔀 Optional custom action"
          description: >-
            Optional action sequence to run instead of the built-in light
            toggle behavior when the Shelly relay is already on. If empty, the
            blueprint uses the default smart-light toggle action.
          default: []
          selector:
            action: {}

mode: restart

variables:
  shelly_input: !input shelly_input
  shelly_relay: !input shelly_relay
  target_light: !input target_light
  brightness_pct: !input brightness_pct
  light_color_temp: !input light_color_temp
  fallback_power_sensor: !input fallback_power_sensor
  light_state_change_timeout: !input light_state_change_timeout
  fallback_off_threshold_w: !input fallback_off_threshold_w
  fallback_power_cycle_delay: !input fallback_power_cycle_delay
  custom_action: !input custom_action

trigger:
  - platform: state
    entity_id: !input shelly_input
    id: shelly_input_changed

condition:
  - condition: template
    value_template: >-
      {{
        trigger.to_state is not none
        and trigger.from_state is not none
        and trigger.from_state.state in ['on', 'off']
        and trigger.from_state.state != trigger.to_state.state
        and trigger.to_state.state in ['on', 'off']
      }}

action:
  - variables:
      shelly_trigger_entity: "{{ trigger.entity_id }}"
      shelly_input_state: "{{ trigger.to_state.state }}"
      shelly_input_previous_state: "{{ trigger.from_state.state }}"
      smart_light_available: >-
        {{ states(target_light) not in ['unavailable', 'unknown'] }}
      expected_light_state: "{{ 'off' if is_state(target_light, 'on') else 'on' }}"
      relay_is_on: "{{ is_state(shelly_relay, 'on') }}"
      fallback_power_sensor_available: >-
        {{
          fallback_power_sensor is not none
          and states(fallback_power_sensor) not in ['unavailable', 'unknown']
        }}
      fallback_power_w: >-
        {% if fallback_power_sensor is not none %}
          {{ states(fallback_power_sensor) | float(0) }}
        {% else %}
          0
        {% endif %}
      power_before_cmd: >-
        {% if fallback_power_sensor is not none
             and states(fallback_power_sensor) not in ['unavailable', 'unknown'] %}
          {{ states(fallback_power_sensor) | float(0) }}
        {% else %}
          0
        {% endif %}
  - if:
      - condition: template
        value_template: "{{ not smart_light_available }}"
    then:
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ not relay_is_on }}"
            sequence:
              - action: switch.turn_on
                target:
                  entity_id: !input shelly_relay
          - conditions:
              - condition: template
                value_template: "{{ fallback_power_sensor_available }}"
              - condition: template
                value_template: "{{ fallback_power_w > (fallback_off_threshold_w | float(0)) }}"
            sequence:
              - action: switch.turn_off
                target:
                  entity_id: !input shelly_relay
          - conditions:
              - condition: template
                value_template: "{{ fallback_power_sensor_available }}"
            sequence:
              - action: switch.turn_off
                target:
                  entity_id: !input shelly_relay
              - delay: !input fallback_power_cycle_delay
              - action: switch.turn_on
                target:
                  entity_id: !input shelly_relay
        default:
          - action: switch.turn_off
            target:
              entity_id: !input shelly_relay
          - delay: !input fallback_power_cycle_delay
          - action: switch.turn_on
            target:
              entity_id: !input shelly_relay
    else:
      - if:
          - condition: state
            entity_id: !input shelly_relay
            state: "on"
        then:
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ custom_action | length > 0 }}"
                sequence: !input custom_action
              - conditions:
                  - condition: template
                    value_template: "{{ expected_light_state == 'on' and light_color_temp is number }}"
                sequence:
                  - action: light.turn_on
                    target:
                      entity_id: !input target_light
                    data:
                      brightness_pct: !input brightness_pct
                      color_temp_kelvin: !input light_color_temp
              - conditions:
                  - condition: template
                    value_template: "{{ expected_light_state == 'on' }}"
                sequence:
                  - action: light.turn_on
                    target:
                      entity_id: !input target_light
                    data:
                      brightness_pct: !input brightness_pct
            default:
              - action: light.turn_off
                target:
                  entity_id: !input target_light
          - if:
              - condition: template
                value_template: "{{ custom_action | length == 0 }}"
            then:
              - wait_template: >-
                  {{
                    is_state(target_light, expected_light_state)
                    or (
                      fallback_power_sensor is not none
                      and states(fallback_power_sensor) not in ['unavailable', 'unknown']
                      and (
                        (
                          expected_light_state == 'off'
                          and (states(fallback_power_sensor) | float(0)) < (power_before_cmd - (fallback_off_threshold_w | float(0)))
                        )
                        or
                        (
                          expected_light_state == 'on'
                          and (states(fallback_power_sensor) | float(0)) > (power_before_cmd + (fallback_off_threshold_w | float(0)))
                        )
                      )
                    )
                  }}
                timeout: !input light_state_change_timeout
              - if:
                  - condition: template
                    value_template: "{{ not wait.completed }}"
                then:
                  - if:
                      - condition: template
                        value_template: "{{ expected_light_state == 'on' }}"
                    then:
                      - action: switch.turn_off
                        target:
                          entity_id: !input shelly_relay
                      - delay: !input fallback_power_cycle_delay
                      - action: switch.turn_on
                        target:
                          entity_id: !input shelly_relay
                    else:
                      - action: switch.turn_off
                        target:
                          entity_id: !input shelly_relay
        else:
          - action: switch.turn_on
            target:
              entity_id: !input shelly_relay
