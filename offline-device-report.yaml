blueprint:
  name: "📵 Weekly Offline & Battery Report"
  description: >
    📅 Sends a weekly report of battery devices that have gone offline and/or
    any unavailable devices. Disabled devices are automatically skipped.
    Mobile companion-app devices can be silenced with a single toggle instead
    of maintaining a long exclude list.


    **Template variables available in actions:**

    `{{ battery_list }}` · `{{ battery_count }}` · `{{ offline_list }}` ·
    `{{ offline_count }}` · `{{ report }}`


    **Trigger manually via CLI:**

    ```

    hass-cli service call automation.trigger --arguments "entity_id=automation.battery_device_has_gone_offline"

    ```
  domain: automation
  homeassistant:
    min_version: "2023.11.0"
  input:
    schedule_section:
      name: "⏰ Schedule"
      icon: mdi:clock-outline
      description: "When to run the offline device check."
      input:
        time:
          name: "🕐 Check time"
          description: "Time of day to run the report."
          default: "10:00:00"
          selector:
            time: {}
        day:
          name: "📅 Day of week"
          description: "Day of the week to run the check."
          default: "7"
          selector:
            select:
              options:
                - label: "Every day"
                  value: "0"
                - label: "Monday"
                  value: "1"
                - label: "Tuesday"
                  value: "2"
                - label: "Wednesday"
                  value: "3"
                - label: "Thursday"
                  value: "4"
                - label: "Friday"
                  value: "5"
                - label: "Saturday"
                  value: "6"
                - label: "Sunday"
                  value: "7"

    checks_section:
      name: "🔍 Checks"
      icon: mdi:magnify
      description: "What to include in the report."
      input:
        check_battery_offline:
          name: "🔋 Report offline battery devices"
          description: >
            Notify when sensors/binary_sensors with device_class: battery
            become unavailable.
          default: true
          selector:
            boolean: {}
        check_offline_devices:
          name: "📡 Report all offline devices"
          description: >
            Notify when a device goes offline. Sourced from the offline_devices
            integration (binary_sensor.offline_devices_devices_offline), which
            reports devices whose entities are all unavailable. Requires that
            integration to be set up:
            https://github.com/pschmitt/homeassistant-offline-devices
          default: false
          selector:
            boolean: {}
        require_all_entities_unavailable:
          name: "🔒 Strict offline detection"
          description: >
            No longer used for the offline-devices list: the offline_devices
            integration is always strict (a device is offline only when ALL of
            its entities are unavailable). Kept for backward compatibility.
          default: true
          selector:
            boolean: {}

    exclusion_section:
      name: "🙈 Exclusions"
      icon: mdi:eye-off
      description: "Configure what to exclude from the checks."
      input:
        ignore_mobile_devices:
          name: "📱 Ignore mobile devices"
          description: >
            Skip all entities from the Mobile App integration (iOS / Android
            companion apps). Prevents false positives from phones and tablets
            without needing a long exclude list.
          default: true
          selector:
            boolean: {}
        exclude:
          name: "🚫 Additional excluded entities / devices / areas"
          description: >
            Specific entities, devices, or areas to always exclude from all
            checks regardless of device type.
          default:
            entity_id: []
          selector:
            target: {}
        exclude_labels:
          name: "🏷️ Excluded labels"
          description: >
            Skip any device or entity that carries at least one of these labels.
            Useful for silencing known-intermittent or always-offline devices
            without maintaining a long entity exclude list.
          default: []
          selector:
            label:
              multiple: true

    notification_section:
      name: "🔔 Notifications"
      icon: mdi:bell-alert
      description: >
        Actions to run when problems are detected.


        Available template variables: `{{ report }}`, `{{ battery_list }}`,
        `{{ battery_count }}`, `{{ offline_list }}`, `{{ offline_count }}`.
      input:
        actions:
          name: "🔔 Actions"
          description: "Notifications or other actions to trigger."
          selector:
            action: {}

variables:
  day: !input day
  check_battery_offline: !input check_battery_offline
  check_offline_devices: !input check_offline_devices
  require_all_entities_unavailable: !input require_all_entities_unavailable
  ignore_mobile_devices: !input ignore_mobile_devices
  exclude: !input exclude
  exclude_labels: !input exclude_labels
  lbl_excl_eids: >
    {% set ns = namespace(items=[]) %}
    {% for lbl in exclude_labels %}
      {% set ns.items = ns.items + (label_entities(lbl) | list) %}
    {% endfor %}
    {{ ns.items }}
  lbl_excl_dids: >
    {% set ns = namespace(items=[]) %}
    {% for lbl in exclude_labels %}
      {% set ns.items = ns.items + (label_devices(lbl) | list) %}
    {% endfor %}
    {{ ns.items }}
  battery_list: >
    {% set mobile = integration_entities('mobile_app') if ignore_mobile_devices else [] %}
    {% set excl_eids = exclude.entity_id | default([]) %}
    {% set excl_dids = exclude.device_id | default([]) %}
    {% set ns = namespace(items=[]) %}
    {% if check_battery_offline %}
      {% for s in states.sensor
           | selectattr('attributes.device_class', 'defined')
           | selectattr('attributes.device_class', '==', 'battery')
           | selectattr('state', '==', 'unavailable') %}
        {% if s.entity_id not in excl_eids and s.entity_id not in mobile
             and s.entity_id not in lbl_excl_eids %}
          {% set did = device_id(s.entity_id) %}
          {% if did is none or (did not in excl_dids and did not in lbl_excl_dids
               and device_attr(did, 'disabled_by') is none) %}
            {% set ns.items = ns.items + [s.name] %}
          {% endif %}
        {% endif %}
      {% endfor %}
      {% for s in states.binary_sensor
           | selectattr('attributes.device_class', 'defined')
           | selectattr('attributes.device_class', '==', 'battery')
           | selectattr('state', '==', 'unavailable') %}
        {% if s.entity_id not in excl_eids and s.entity_id not in mobile
             and s.entity_id not in lbl_excl_eids %}
          {% set did = device_id(s.entity_id) %}
          {% if did is none or (did not in excl_dids and did not in lbl_excl_dids
               and device_attr(did, 'disabled_by') is none) %}
            {% set ns.items = ns.items + [s.name] %}
          {% endif %}
        {% endif %}
      {% endfor %}
    {% endif %}
    {{ ns.items | sort | join('\n') }}
  battery_count: >
    {% set bl = battery_list | trim %}
    {{ (bl.count('\n') + 1) if bl else 0 }}
  offline_list: >
    {% set mobile = integration_entities('mobile_app') if ignore_mobile_devices else [] %}
    {% set excl_eids = exclude.entity_id | default([]) %}
    {% set excl_dids = exclude.device_id | default([]) %}
    {% set ns = namespace(battery_dids=[], seen=[], items=[]) %}
    {% if check_battery_offline %}
      {% for s in states.sensor
           | selectattr('attributes.device_class', 'defined')
           | selectattr('attributes.device_class', '==', 'battery')
           | selectattr('state', '==', 'unavailable') %}
        {% if s.entity_id not in excl_eids and s.entity_id not in mobile
             and s.entity_id not in lbl_excl_eids %}
          {% set did = device_id(s.entity_id) %}
          {% if did is not none and did not in ns.battery_dids and did not in excl_dids
             and did not in lbl_excl_dids and device_attr(did, 'disabled_by') is none %}
            {% set ns.battery_dids = ns.battery_dids + [did] %}
          {% endif %}
        {% endif %}
      {% endfor %}
      {% for s in states.binary_sensor
           | selectattr('attributes.device_class', 'defined')
           | selectattr('attributes.device_class', '==', 'battery')
           | selectattr('state', '==', 'unavailable') %}
        {% if s.entity_id not in excl_eids and s.entity_id not in mobile
             and s.entity_id not in lbl_excl_eids %}
          {% set did = device_id(s.entity_id) %}
          {% if did is not none and did not in ns.battery_dids and did not in excl_dids
             and did not in lbl_excl_dids and device_attr(did, 'disabled_by') is none %}
            {% set ns.battery_dids = ns.battery_dids + [did] %}
          {% endif %}
        {% endif %}
      {% endfor %}
    {% endif %}
    {% if check_offline_devices %}
      {# Single source of truth: the offline_devices integration (global scope).
         It already detects devices whose entities are all unavailable and skips
         disabled / 'intermittent'-labelled devices. The blueprint's own
         exclusions (explicit devices, labels, mobile apps, battery dedup) are
         still applied on top. The "strict" toggle no longer affects this list —
         the integration is always strict. #}
      {% set src = 'binary_sensor.offline_devices_devices_offline' %}
      {% set ids = state_attr(src, 'device_ids') or [] %}
      {% set names = state_attr(src, 'devices') or [] %}
      {% set mobile_dids = (mobile | map('device_id') | select('string') | list) if mobile else [] %}
      {% for i in range(ids | length) %}
        {% set did = ids[i] %}
        {% if did not in ns.seen and did not in excl_dids and did not in lbl_excl_dids
           and did not in ns.battery_dids and did not in mobile_dids %}
          {% set ns.seen = ns.seen + [did] %}
          {% set ns.items = ns.items + [names[i]] %}
        {% endif %}
      {% endfor %}
    {% endif %}
    {{ ns.items | sort | join('\n') }}
  offline_count: >
    {% set ol = offline_list | trim %}
    {{ (ol.count('\n') + 1) if ol else 0 }}
  report: >
    {% set ns = namespace(parts=[]) %}
    {% set bl = battery_list | trim %}
    {% set ol = offline_list | trim %}
    {% if bl %}
      {% set header = '🔋 Offline battery devices (' ~ (battery_count | trim) ~ '):' %}
      {% set body = '• ' ~ (bl | replace('\n', '\n• ')) %}
      {% set ns.parts = ns.parts + [header ~ '\n' ~ body] %}
    {% endif %}
    {% if ol %}
      {% set header = '📡 Offline devices (' ~ (offline_count | trim) ~ '):' %}
      {% set body = '• ' ~ (ol | replace('\n', '\n• ')) %}
      {% set ns.parts = ns.parts + [header ~ '\n' ~ body] %}
    {% endif %}
    {{ ns.parts | join('\n\n') }}

trigger:
  - platform: time
    at: !input time

condition:
  - condition: template
    value_template: >
      {{ day | int == 0 or day | int == now().isoweekday() }}
  - condition: template
    value_template: >
      {{ (battery_list | trim | length > 0) or (offline_list | trim | length > 0) }}

action:
  - choose: []
    default: !input actions

mode: single
