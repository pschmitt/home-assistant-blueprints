blueprint:
  name: Simple Motion Light With Timer
  description: >
    Turn a light on when motion is detected, keep it on with a visible timer,
    and turn it off after all motion has cleared. Includes lux gating, an
    active time window, and separate day/night brightness levels.
  domain: automation
  input:
    entities:
      name: Entities
      icon: mdi:devices
      description: Pick the motion sensors, controlled light, timer helper, and lux sensor used by this automation.
      input:
        motion_sensors:
          name: 👀 Motion sensors
          description: One or more binary sensors that turn the light on and keep the timer alive while any sensor is on.
          selector:
            entity:
              domain: binary_sensor
              multiple: true
        light_entity:
          name: 💡 Light
          description: The light entity this automation turns on and off.
          selector:
            entity:
              domain: light
        timer_entity:
          name: ⏲️ Timer
          description: A timer helper used as the visible off countdown. It is started, restarted, or canceled by the automation.
          selector:
            entity:
              domain: timer
        lux_sensor:
          name: 🔆 Lux sensor
          description: Sensor used to decide whether the room is dark enough before turning the light on.
          selector:
            entity:
              domain: sensor

    activation:
      name: Activation rules
      icon: mdi:motion-sensor
      description: Control when motion is allowed to turn the light on.
      input:
        max_lux:
          name: 🔢 Maximum lux
          description: Motion only turns the light on when the lux sensor is below this value. If the light is already on, motion still restarts the timer.
          default: 300
          selector:
            number:
              min: 0.0
              max: 2000.0
              unit_of_measurement: lx
              step: 1.0
              mode: slider
        after_time:
          name: 🌅 Active after
          description: Earliest time of day when motion is allowed to turn the light on.
          default: "06:00:00"
          selector:
            time: {}
        before_time:
          name: 🌇 Active before
          description: Latest time of day when motion is allowed to turn the light on.
          default: "23:00:00"
          selector:
            time: {}
        enforce_time_window:
          name: 🕐 Enforce time window
          description: >
            When enabled (default), motion only turns the light on within the Active after/before window.
            Disable to allow motion to trigger the light at any hour.
          default: true
          selector:
            boolean: {}

    timer:
      name: Timer behavior
      icon: mdi:timer-outline
      description: Configure how long the light remains on after motion has cleared.
      input:
        off_delay_minutes:
          name: ⏳ Off delay
          description: Minutes to keep the light on after the last motion sensor turns off. New motion restarts this timer.
          default: 5
          selector:
            number:
              min: 0.0
              max: 60.0
              unit_of_measurement: minutes
              step: 1.0
              mode: slider

    brightness:
      name: Brightness
      icon: mdi:brightness-6
      description: Set separate brightness levels for daytime and nighttime operation.
      input:
        night_start:
          name: 🌙 Night starts at
          description: Time when the automation starts using the night brightness value. Supports ranges that cross midnight.
          default: "16:00:00"
          selector:
            time: {}
        night_end:
          name: 🌞 Night ends at
          description: Time when the automation returns to the day brightness value.
          default: "03:00:00"
          selector:
            time: {}
        day_brightness:
          name: ☀️ Day brightness
          description: Brightness percentage used outside the configured night period.
          default: 85
          selector:
            number:
              min: 1.0
              max: 100.0
              unit_of_measurement: "%"
              step: 1.0
              mode: slider
        night_brightness:
          name: 🌜 Night brightness
          description: Brightness percentage used between night start and night end.
          default: 33
          selector:
            number:
              min: 1.0
              max: 100.0
              unit_of_measurement: "%"
              step: 1.0
              mode: slider

mode: restart
max_exceeded: silent

variables:
  motion_sensors: !input motion_sensors
  light_entity: !input light_entity
  timer_entity: !input timer_entity
  lux_sensor: !input lux_sensor
  max_lux: !input max_lux
  off_delay_minutes: !input off_delay_minutes
  after_time: !input after_time
  before_time: !input before_time
  night_start: !input night_start
  night_end: !input night_end
  day_brightness: !input day_brightness
  night_brightness: !input night_brightness
  enforce_time_window: !input enforce_time_window
  brightness_pct: >-
    {% set now_time = now().strftime('%H:%M:%S') %}
    {% if night_start <= night_end %}
      {% set is_night = night_start <= now_time < night_end %}
    {% else %}
      {% set is_night = now_time >= night_start or now_time < night_end %}
    {% endif %}
    {% if is_night %}
      {{ night_brightness | int }}
    {% else %}
      {{ day_brightness | int }}
    {% endif %}

trigger:
  - platform: state
    entity_id: !input motion_sensors
    to: "on"
    id: motion-on

  - platform: state
    entity_id: !input motion_sensors
    to: "off"
    id: motion-off

  - platform: event
    event_type: timer.finished
    id: timer-finished
    event_data:
      entity_id: !input timer_entity

  - platform: state
    entity_id: !input light_entity
    to: "off"
    id: light-off

condition: []

action:
  - choose:
      - conditions:
          - condition: trigger
            id: motion-on
        sequence:
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ states(light_entity) == 'on' }}"
                sequence:
                  - action: timer.start
                    target:
                      entity_id: !input timer_entity
                    data:
                      duration:
                        minutes: !input off_delay_minutes
            default:
              - condition: template
                value_template: >-
                  {% if not enforce_time_window %}
                    true
                  {% else %}
                    {% set t = now().strftime('%H:%M:%S') %}
                    {% if after_time <= before_time %}
                      {{ after_time <= t < before_time }}
                    {% else %}
                      {{ t >= after_time or t < before_time }}
                    {% endif %}
                  {% endif %}
              - condition: template
                value_template: "{{ states(lux_sensor) | float(99999) < (max_lux | float) }}"
              - action: light.turn_on
                target:
                  entity_id: !input light_entity
                data:
                  brightness_pct: "{{ brightness_pct }}"
              - action: timer.start
                target:
                  entity_id: !input timer_entity
                data:
                  duration:
                    minutes: !input off_delay_minutes

      - conditions:
          - condition: trigger
            id: motion-off
          - condition: template
            value_template: "{{ expand(motion_sensors) | selectattr('state', 'eq', 'on') | list | count == 0 }}"
          - condition: template
            value_template: "{{ states(light_entity) == 'on' }}"
        sequence:
          - action: timer.start
            target:
              entity_id: !input timer_entity
            data:
              duration:
                minutes: !input off_delay_minutes

      - conditions:
          - condition: trigger
            id: timer-finished
          - condition: template
            value_template: "{{ expand(motion_sensors) | selectattr('state', 'eq', 'on') | list | count == 0 }}"
        sequence:
          - action: light.turn_off
            target:
              entity_id: !input light_entity

      - conditions:
          - condition: trigger
            id: light-off
        sequence:
          - action: timer.cancel
            target:
              entity_id: !input timer_entity
